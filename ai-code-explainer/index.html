<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Code Explainer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🤖 AI Code Explainer</h1>
    <p>Paste your JavaScript code and get a beginner-friendly explanation.</p>

    <textarea id="codeInput" placeholder="Paste your JavaScript code here..."></textarea>

    <button onclick="explainCode()">Explain Code</button>

    <div id="output"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
